; Optional extra browser/fork profile locations for MozBackupSharp.
; This file is copied next to the EXE. You can add new Firefox-family forks
; without recompiling the program.
;
; Format:
; [Product:UniqueName]
; Name=Display name shown in the application combo box
; Kind=FirefoxFork
; Scope=Roaming       ; Roaming, Local, or Both
; Roots=Vendor\Product|AlternateVendor\Product
;
; Roots are relative to %APPDATA% when Scope=Roaming and/or relative to
; %LOCALAPPDATA% when Scope=Local. The automatic Roaming detector expects either:
;   <root>\profiles.ini
; or:
;   <root>\Profiles\<profile folders>
; For Local scope, profiles.ini is required to avoid detecting browser cache
; folders as real profiles.
;
; Example for a fictional Firefox fork:
; [Product:ExampleFox]
; Name=ExampleFox
; Kind=FirefoxFork
; Scope=Both
; Roots=ExampleSoft\ExampleFox|ExampleFox
;
; Portable products such as Tor Browser or Mullvad Browser often keep the
; profile under the installation folder instead of AppData. For those, use
; the UI button "Use custom profile folder..." and select the actual profile
; folder, for example:
;   Tor Browser\Browser\TorBrowser\Data\Browser\profile.default
